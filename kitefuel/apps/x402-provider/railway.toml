# ── KiteFuel x402-provider — Railway service config ───────────────────────────
# Railway dashboard: set Root Directory = apps/x402-provider for this service.
# Railway will find and apply this file automatically from that root.

[build]
builder        = "DOCKERFILE"
# Relative to service root directory (apps/x402-provider/)
dockerfilePath = "Dockerfile"

[deploy]
startCommand            = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-9000} --workers 2"
healthcheckPath         = "/health"
healthcheckTimeout      = 20
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ──────────────────────────────────────────────────────────────────────────────
# Required env vars — set in Railway → x402-provider service → Variables
#
#   PROVIDER_WALLET_ADDRESS  = <wallet address that receives x402 payments>
#   SERVICE_URL              = https://<Railway public URL of this service>
#   FACILITATOR_BASE_URL     = https://<Kite Passport / facilitator endpoint>
# ──────────────────────────────────────────────────────────────────────────────
